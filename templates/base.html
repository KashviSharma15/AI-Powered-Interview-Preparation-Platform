<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rehearsal — Interview Practice{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="stage-glow"></div>
    <header class="site-header">
        <a href="{{ url_for('index') }}" class="brand">Rehearsal<span class="brand-dot">.</span></a>
        <nav>
            <a href="{{ url_for('index') }}">Practice</a>
            <a href="{{ url_for('dashboard') }}">Progress</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>Built with Flask, Whisper &amp; OpenCV — runs entirely on your machine.</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
